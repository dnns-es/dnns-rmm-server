<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNNS RMM - Consola</title>
<link rel="stylesheet" href="/css/estilos.css">
<script src="/js/tema.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<meta name="theme-color" content="#69c350">
<style>
  #terminal { height: calc(100vh - 120px); background: #000; padding: 8px; border-radius: 8px; }
  .xterm-viewport::-webkit-scrollbar { width: 10px; }
  .xterm-viewport::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 5px; }
</style>
</head>
<body>

<header class="barra">
  <div class="contenedor barra-flex">
    <div><span class="logo">DNNS RMM</span> <span class="logo-tag" id="subtitulo">consola</span></div>
    <nav class="menu">
      <a href="/admin">← Volver</a>
      <button class="link" id="btnReconnect" title="Reconectar">↻</button>
      <button class="link" id="btnLogout">Salir</button>
    </nav>
  </div>
</header>

<main class="contenedor" style="padding-top:16px;">
  <div id="estado" class="alerta alerta-ok" style="margin-bottom:10px;">Iniciando...</div>
  <div id="terminal"></div>
</main>

<script>
const params = new URLSearchParams(location.search);
const port = parseInt(params.get('port') || '0', 10);
const hostname = params.get('host') || '';
if (!port) {
  document.getElementById('estado').textContent = 'Falta parámetro port';
} else {
  document.getElementById('subtitulo').textContent = `consola → ${hostname || 'agente'} (tunnel :${port})`;
  document.title = `RMM: ${hostname || port}`;
}

const estado = document.getElementById('estado');
const term = new Terminal({
  fontFamily: 'IBM Plex Mono, Consolas, monospace',
  fontSize: 14,
  cursorBlink: true,
  theme: {
    background: '#000',
    foreground: '#e6edf3',
    cursor: '#69c350',
    selectionBackground: 'rgba(105,195,80,.25)'
  },
  convertEol: true
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('terminal'));
fit.fit();

window.addEventListener('resize', () => { fit.fit(); enviarResize(); });

let ws = null;
function conectar() {
  if (ws && ws.readyState === 1) ws.close();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/consola?port=${port}`);
  estado.className = 'alerta alerta-ok';
  estado.textContent = 'Conectando...';

  ws.onopen = () => {
    estado.textContent = '✓ Conectado (Ctrl+D para salir)';
    setTimeout(() => { estado.style.display='none'; enviarResize(); }, 2000);
    term.focus();
  };
  ws.onmessage = (e) => {
    if (typeof e.data === 'string') term.write(e.data);
    else e.data.text().then(t => term.write(t));
  };
  ws.onerror = () => { estado.className='alerta alerta-error'; estado.textContent='Error WebSocket'; estado.style.display=''; };
  ws.onclose = () => { estado.className='alerta alerta-error'; estado.textContent='Conexion cerrada - haz click en ↻ para reconectar'; estado.style.display=''; };
}

function enviarResize() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ tipo: 'resize', cols: term.cols, rows: term.rows }));
  }
}

term.onData((d) => {
  if (ws && ws.readyState === 1) ws.send(d);
});

document.getElementById('btnReconnect').addEventListener('click', () => { term.clear(); conectar(); });
document.getElementById('btnLogout').addEventListener('click', async () => {
  await fetch('/api/auth/logout', {method:'POST', credentials:'same-origin'});
  location.href = '/login';
});

if (port) conectar();
</script>

</body>
</html>
