<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNNS RMM - Login</title>
<link rel="stylesheet" href="/css/estilos.css">
<script src="/js/tema.js"></script>
<meta name="theme-color" content="#69c350">
</head>
<body>

<header class="barra">
  <div class="contenedor barra-flex">
    <div><span class="logo">DNNS RMM</span> <span class="logo-tag">server admin</span></div>
    <nav class="menu"></nav>
  </div>
</header>

<main class="contenedor-estrecho">
  <div class="tarjeta">
    <h2 style="text-align:center;margin-bottom:16px;">Acceso administrador</h2>

    <div id="alerta" class="alerta alerta-error oculto"></div>

    <form id="formLogin">
      <div class="campo">
        <label>Usuario</label>
        <input type="text" id="user" required value="admin" autocomplete="username">
      </div>
      <div class="campo">
        <label>Password</label>
        <div style="position:relative;">
          <input type="password" id="password" required autocomplete="current-password" style="padding-right:42px;">
          <button type="button" id="togglePw" title="Mostrar/ocultar"
                  style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;padding:4px 8px;cursor:pointer;color:var(--texto-suave);font-size:1.1rem;">👁</button>
        </div>
      </div>
      <button type="submit" id="btn" style="width:100%;">Acceder</button>
    </form>
  </div>
</main>

<script>
const form = document.getElementById('formLogin');
const btn = document.getElementById('btn');
const alerta = document.getElementById('alerta');
const inputPw = document.getElementById('password');
const togglePw = document.getElementById('togglePw');

togglePw.addEventListener('click', () => {
  if (inputPw.type === 'password') {
    inputPw.type = 'text';
    togglePw.textContent = '🙈';
  } else {
    inputPw.type = 'password';
    togglePw.textContent = '👁';
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alerta.classList.add('oculto');
  btn.disabled = true; btn.textContent = 'Accediendo...';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        user: document.getElementById('user').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const d = await r.json();
    if (r.ok && d.ok) {
      window.location.href = '/admin';
    } else {
      alerta.textContent = d.error || 'Error al acceder';
      alerta.classList.remove('oculto');
      btn.disabled = false; btn.textContent = 'Acceder';
    }
  } catch (err) {
    alerta.textContent = 'Error de red';
    alerta.classList.remove('oculto');
    btn.disabled = false; btn.textContent = 'Acceder';
  }
});
</script>

</body>
</html>
